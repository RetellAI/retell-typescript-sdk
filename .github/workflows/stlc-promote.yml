name: Promote SDKs

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  promote:
    if: github.repository == 'RetellAI/retell-typescript-sdk-staging'
    runs-on: ubuntu-latest
    env:
      PRODUCTION_REPO: RetellAI/retell-typescript-sdk
      GH_TOKEN: ${{ secrets.PRODUCTION_REPO_TOKEN }}
    steps:
      - name: Check out staging
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Fetch production main
        run: |
          git remote add production \
            "https://x-access-token:${GH_TOKEN}@github.com/${PRODUCTION_REPO}.git"
          git fetch production main

      - name: Check if production is already in sync
        id: diff
        run: |
          STAGING_SHA=$(git rev-parse origin/main)
          PRODUCTION_SHA=$(git rev-parse production/main)
          if [ "$STAGING_SHA" = "$PRODUCTION_SHA" ]; then
            echo "Production is already at $STAGING_SHA. Nothing to release."
            echo "synced=true" >> "$GITHUB_OUTPUT"
          else
            echo "synced=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Preserve production-owned files
        if: steps.diff.outputs.synced == 'false'
        run: |
          git config user.name "stlc-bot"
          git config user.email "stlc-bot@users.noreply.github.com"
          git switch --force-create stainless-release origin/main

          for path in \
            .github/workflows/ci.yml \
            .github/workflows/publish-npm.yml \
            .github/workflows/release-doctor.yml \
            .github/workflows/release-please.yml \
            .github/workflows/stlc-auto-merge.yml
          do
            if git cat-file -e "production/main:${path}" 2>/dev/null; then
              git checkout production/main -- "${path}"
            else
              git rm -f --ignore-unmatch "${path}"
            fi
          done

          git rm -f --ignore-unmatch .github/workflows/stlc-promote.yml

          for release_path in \
            .release-please-manifest.json \
            CHANGELOG.md
          do
            if git cat-file -e "production/main:${release_path}" 2>/dev/null; then
              git checkout production/main -- "${release_path}"
            else
              git rm -f --ignore-unmatch "${release_path}"
            fi
          done

          prod_version="$(git show production/main:package.json | node -e 'let input = ""; process.stdin.on("data", chunk => input += chunk); process.stdin.on("end", () => console.log(JSON.parse(input).version));')"
          PROD_VERSION="${prod_version}" node <<'NODE'
            const fs = require("fs");
            for (const path of ["package.json", "packages/mcp-server/package.json"]) {
              const contents = JSON.parse(fs.readFileSync(path, "utf8"));
              contents.version = process.env.PROD_VERSION;
              fs.writeFileSync(path, `${JSON.stringify(contents, null, 2)}\n`);
            }
            const versionPath = "src/version.ts";
            const versionFile = fs.readFileSync(versionPath, "utf8");
            fs.writeFileSync(
              versionPath,
              versionFile.replace(/export const VERSION = '[^']+';/, `export const VERSION = '${process.env.PROD_VERSION}';`),
            );
          NODE

          if ! git diff --quiet HEAD -- \
            .github/workflows \
            .release-please-manifest.json \
            CHANGELOG.md \
            package.json \
            packages/mcp-server/package.json \
            src/version.ts
          then
            git add \
              .github/workflows \
              .release-please-manifest.json \
              CHANGELOG.md \
              package.json \
              packages/mcp-server/package.json \
              src/version.ts
            git commit -m "chore: preserve production workflow files"
          fi

      - name: Push release branch on production
        if: steps.diff.outputs.synced == 'false'
        run: git push production HEAD:refs/heads/stainless-release --force

      - name: Open or update the release PR on production
        if: steps.diff.outputs.synced == 'false'
        run: |
          EXISTING_PR=$(gh pr list \
            --repo "${PRODUCTION_REPO}" \
            --head stainless-release \
            --state open \
            --json number \
            --jq '.[0].number')
          if [ -z "${EXISTING_PR}" ]; then
            gh pr create \
              --repo "${PRODUCTION_REPO}" \
              --base main \
              --head stainless-release \
              --title "Release SDK updates" \
              --body "$(git log --oneline production/main..HEAD)"
          else
            echo "Release PR #${EXISTING_PR} already exists. Force-push has updated it."
          fi
